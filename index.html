<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .btn-add {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #5a67d8;
    }

    .btn-add:active {
      transform: scale(0.97);
    }

    .summary {
      font-size: 13px;
      color: #718096;
      margin-bottom: 12px;
    }

    .summary strong {
      color: #667eea;
    }

    ul {
      list-style: none;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      transition: opacity 0.2s, background 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.checked {
      background: #f0fff4;
      border-color: #c6f6d5;
      opacity: 0.7;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 15px;
      color: #2d3748;
      word-break: break-all;
    }

    .item.checked .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 15px;
    }

    .empty .empty-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    .btn-clear {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      color: #a0aec0;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-clear:hover {
      border-color: #e53e3e;
      color: #e53e3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." maxlength="80">
      <button class="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="summary" id="summary"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty">
      <span class="empty-icon">🛍️</span>
      리스트가 비어 있습니다.<br>아이템을 추가해 보세요!
    </div>

    <button class="btn-clear" id="btnClear" onclick="clearChecked()" style="display:none">
      완료된 항목 모두 삭제
    </button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    const input   = document.getElementById('itemInput');
    const list    = document.getElementById('list');
    const empty   = document.getElementById('empty');
    const summary = document.getElementById('summary');
    const btnClear = document.getElementById('btnClear');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.isComposing) addItem();
    });

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      list.innerHTML = '';

      const total   = items.length;
      const checked = items.filter(i => i.done).length;

      if (total === 0) {
        empty.style.display = 'block';
        summary.textContent = '';
        btnClear.style.display = 'none';
      } else {
        empty.style.display = 'none';
        summary.innerHTML = `총 <strong>${total}</strong>개 중 <strong>${checked}</strong>개 완료`;
        btnClear.style.display = checked > 0 ? 'block' : 'none';

        items.forEach((item, idx) => {
          const li = document.createElement('li');
          li.className = 'item' + (item.done ? ' checked' : '');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = item.done;
          cb.addEventListener('change', () => toggleItem(idx));

          const name = document.createElement('span');
          name.className = 'item-name';
          name.textContent = item.name;

          const del = document.createElement('button');
          del.className = 'btn-delete';
          del.textContent = '✕';
          del.title = '삭제';
          del.addEventListener('click', () => deleteItem(idx));

          li.appendChild(cb);
          li.appendChild(name);
          li.appendChild(del);
          list.appendChild(li);
        });
      }
    }

    function addItem() {
      const name = input.value.trim();
      if (!name) {
        input.focus();
        return;
      }
      items.unshift({ name, done: false });
      input.value = '';
      input.focus();
      save();
      render();
    }

    function toggleItem(idx) {
      items[idx].done = !items[idx].done;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    render();
  </script>
</body>
</html>
